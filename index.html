<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="/script.js" defer></script>
    <title>Todo App</title>
  </head>
  <body>
    <div class="app">
      <header>
        <h1><i class="ph-fill ph-check-circle"></i>My Tasks</h1>
        <p id="date"></p>
      </header>
      <div class="todo-input">
        <input type="text" id="task-input" placeholder="What on your mind ?" />
        <button id="add-task">
          <i class="ph ph-list-plus"></i>
        </button>
      </div>
      <div class="filters">
        <span class="filter active" data-filter="all">All</span>
        <span class="filter" data-filter="active">Active</span>
        <span class="filter" data-filter="completed">Completed</span>
      </div>
      <div class="todo-container">
        <ul id="todo-list">
            <!-- <li class="todo-item">
                <label class="checkbox-container">
                    <input type="checkbox"  class="todo-checkbox">
                    <span class="checkmark"></span>
                </label>
                <span class="todo-item-text">workout</span>
                <button class="edit-btn">
                    <i class="ph ph-pencil"></i>
                </button>
                <button class="delete-btn">
                    <i class="ph ph-trash"></i>
                </button>
            </li> -->
        </ul>
        <div class="empty-state hidden">
            <i class="ph-fill ph-clipboard-text"></i>
            <p>No task here yet</p>
        </div>
      </div>
      <footer>
        <p id="items-left">0 items left</p>
        <button id="clear-completed">Clear completed</button>
      </footer>
    </div>
  </body>
</html>
